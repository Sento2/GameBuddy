<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login Pengguna - GameBuddy</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <header>
    <h1 >🎮LOGIN</h1>
  </header>
  <main>
    <form>
      <label for="username">Nama Pengguna</label><br>
      <input type="text" id="username" name="username" required />
      <br>
      <label for="password">Kata Sandi</label><br>
      <input type="password" id="password" name="password" required />

      <div class="minat-section">
        <label>Pilih minat game kamu:</label><br>
        <label><input type="checkbox" name="minat" value="Mobile Legends" /> Mobile Legends</label>
        <label><input type="checkbox" name="minat" value="Clash of Clans" /> Clash of Clans</label>
        <label><input type="checkbox" name="minat" value="GTA" /> GTA</label>
        <label><input type="checkbox" name="minat" value="God of War" /> God of War</label>
        <label><input type="checkbox" name="minat" value="Delta Force" /> Delta Force</label>
        <label><input type="checkbox" name="minat" value="PUBG" /> PUBG</label>
      </div>

      <button type="submit">Login</button>
    </form>
    <a class="kembali" href="index.html">← Kembali ke Beranda</a>
  </main>
</body>
</html>
